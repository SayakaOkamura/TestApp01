<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>さくらリフォーム | 案件管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <span class="logo-icon">🌸</span>
    <div class="logo-text">さくらリフォーム<br><span style="font-weight:400;font-size:11px;opacity:.7">販売管理システム</span></div>
  </div>
  <ul class="sidebar-nav">
    <li><a href="index.html"><span class="nav-icon">📊</span><span class="nav-text">ダッシュボード</span></a></li>
    <li class="active"><a href="projects.html"><span class="nav-icon">📋</span><span class="nav-text">案件管理</span></a></li>
    <li><a href="assignment.html"><span class="nav-icon">🎯</span><span class="nav-text">担当管理</span></a></li>
    <li><a href="customers.html"><span class="nav-icon">🏠</span><span class="nav-text">顧客管理</span></a></li>
    <li><a href="invoices.html"><span class="nav-icon">💰</span><span class="nav-text">請求・入金管理</span></a></li>
  </ul>
  <button class="sidebar-mini-toggle" id="sidebar-mini-toggle" title="折りたたむ / 展開する">
    <span class="mini-icon">◁</span><span class="mini-label">折りたたむ</span>
  </button>
  <div class="sidebar-footer">株式会社さくらリフォーム<br>営業部管理システム</div>
</nav>

<main class="main-content">
  <div class="page-header">
    <h1>📋 案件管理</h1>
    <button class="btn btn-accent" onclick="openModal()">＋ 新規案件</button>
  </div>

  <div class="summary-row" id="summary-row"></div>

  <div class="card">
    <div class="card-header" style="display:flex;align-items:center;gap:8px">
      <span>案件一覧</span>
      <div class="spacer"></div>
      <input class="search-box" id="search" placeholder="🔍 案件名・顧客名で検索" oninput="applyFilter()" style="width:190px">
      <button class="btn btn-outline btn-sm" onclick="exportCSV()">↓ CSV</button>
      <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="toggleFilterSection()">🔍 絞り込み <span id="filter-arrow">▼</span></button>
    </div>
    <div class="filter-bar" id="filter-section">
      <div>
        <div class="filter-group-label">🚨 緊急</div>
        <div class="chip-group">
          <button class="chip urgent" id="chip-urgent" onclick="toggleUrgent(this)">緊急のみ</button>
        </div>
      </div>
      <div>
        <div class="filter-group-label">ステータス</div>
        <div class="chip-group" id="chips-status">
          <button class="chip active" data-val="" onclick="setChip(this,'status')">すべて</button>
          <button class="chip" data-val="契約済" onclick="setChip(this,'status')">契約済</button>
          <button class="chip" data-val="商談中" onclick="setChip(this,'status')">商談中</button>
          <button class="chip" data-val="見積提出済" onclick="setChip(this,'status')">見積提出済</button>
          <button class="chip" data-val="現地調査済" onclick="setChip(this,'status')">現地調査済</button>
          <button class="chip" data-val="初回訪問済" onclick="setChip(this,'status')">初回訪問済</button>
          <button class="chip" data-val="失注" onclick="setChip(this,'status')">失注</button>
        </div>
      </div>
      <div>
        <div class="filter-group-label">工事種別</div>
        <div class="chip-group" id="chips-work">
          <button class="chip active" data-val="" onclick="setChip(this,'work')">すべて</button>
          <button class="chip" data-val="外装" onclick="setChip(this,'work')">外装</button>
          <button class="chip" data-val="水回り" onclick="setChip(this,'work')">水回り</button>
          <button class="chip" data-val="内装" onclick="setChip(this,'work')">内装</button>
          <button class="chip" data-val="バリアフリー" onclick="setChip(this,'work')">バリアフリー</button>
          <button class="chip" data-val="省エネ" onclick="setChip(this,'work')">省エネ</button>
          <button class="chip" data-val="建具" onclick="setChip(this,'work')">建具</button>
        </div>
      </div>
    </div>
    <div class="card-body no-pad">
      <table class="data-table">
        <thead>
          <tr>
            <th>案件名</th><th>顧客名</th><th>工事種別</th><th>担当者</th>
            <th>ステータス</th><th style="text-align:center">確度</th>
            <th style="text-align:right">金額</th><th>契約日</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="projects-tbody"><tr><td colspan="9" class="empty-state">読込中…</td></tr></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination" style="display:none"></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">新規案件登録</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-grid">
        <div class="form-group full"><label>案件名 *</label><input id="f-name" required></div>
        <div class="form-group"><label>顧客名</label><input id="f-customer"></div>
        <div class="form-group"><label>担当者</label>
          <select id="f-staff">
            <option value="">選択</option>
            <option>佐々木</option><option>中島</option><option>田村</option>
            <option>山口</option><option>加藤</option>
          </select>
        </div>
        <div class="form-group"><label>工事種別</label>
          <select id="f-work-type">
            <option value="">選択</option>
            <option>外装</option><option>水回り</option><option>内装</option>
            <option>バリアフリー</option><option>省エネ</option><option>建具</option>
          </select>
        </div>
        <div class="form-group"><label>ステータス</label>
          <select id="f-status">
            <option>初回訪問済</option><option>現地調査済</option><option>見積提出済</option>
            <option>商談中</option><option>契約済</option><option>失注</option>
          </select>
        </div>
        <div class="form-group"><label>契約確度（%）</label><input id="f-probability" type="number" min="0" max="100" value="0"></div>
        <div class="form-group"><label>概算金額（円）</label><input id="f-estimated" type="number" min="0" value="0"></div>
        <div class="form-group full"><label>住所</label><input id="f-address"></div>
        <div class="form-group"><label>初回訪問日</label><input id="f-first-visit" type="date"></div>
        <div class="form-group"><label>着工予定日</label><input id="f-planned-start" type="date"></div>
        <div class="form-group"><label>契約日</label><input id="f-contract-date" type="date"></div>
        <div class="form-group"><label>契約金額（円）</label><input id="f-contract-amount" type="number" min="0" value="0"></div>
        <div class="form-group full"><label>備考</label><textarea id="f-notes"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-accent" onclick="saveProject()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allProjects = [], filteredProjects = [], currentPage = 1;
const PAGE_SIZE = 10;
let showUrgentOnly = false;
let filterStatus = '', filterWork = '';

const STATUS_MAP = { '契約済':'contracted','商談中':'negotiating','見積提出済':'quoted','現地調査済':'visited','初回訪問済':'surveyed','失注':'lost' };
const fmt = v => new Intl.NumberFormat('ja-JP', { style:'currency', currency:'JPY', maximumFractionDigits:0 }).format(v||0);

function getUrgency(p) {
  const notes = (p.notes || '').toLowerCase();
  const today = new Date(); today.setHours(0,0,0,0);
  const pd = p.planned_start_date ? new Date(p.planned_start_date) : null;
  if (notes.includes('急ぎ') || notes.includes('雨漏り') || notes.includes('緊急'))
    return { level: 'critical', reason: '緊急対応' };
  if (pd && !isNaN(pd) && pd < today && p.status !== '契約済')
    return { level: 'critical', reason: '着工遅延' };
  if ((p.probability || 0) >= 70 && ['商談中', '見積提出済'].includes(p.status))
    return { level: 'warning', reason: '要フォロー' };
  if (!p.staff && p.status !== '契約済')
    return { level: 'warning', reason: '担当未定' };
  return null;
}

async function loadProjects() {
  const res = await fetch('/api/projects');
  allProjects = await res.json();
  renderSummary();
  applyFilter();
}

function renderSummary() {
  const contracted = allProjects.filter(p => p.status === '契約済');
  const active = allProjects.filter(p => !['契約済','失注'].includes(p.status));
  const totalContract = contracted.reduce((s, p) => s + (p.contract_amount||0), 0);
  document.getElementById('summary-row').innerHTML = `
    <div class="summary-chip">全 <strong>${allProjects.length}</strong> 件</div>
    <div class="summary-chip">契約済 <strong>${contracted.length}</strong> 件</div>
    <div class="summary-chip">商談中 <strong>${active.length}</strong> 件</div>
    <div class="summary-chip">受注総額 <strong>${fmt(totalContract)}</strong></div>
  `;
}

function setChip(el, type) {
  const group = document.getElementById('chips-' + type);
  group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (type === 'status') filterStatus = el.dataset.val;
  if (type === 'work')   filterWork   = el.dataset.val;
  applyFilter();
}

function toggleUrgent(btn) {
  showUrgentOnly = !showUrgentOnly;
  btn.classList.toggle('active', showUrgentOnly);
  applyFilter();
}

function toggleFilterSection() {
  const sec = document.getElementById('filter-section');
  const btn = document.getElementById('filter-toggle-btn');
  const arrow = document.getElementById('filter-arrow');
  const hidden = sec.classList.toggle('hidden');
  btn.classList.toggle('active', !hidden);
  arrow.textContent = hidden ? '▼' : '▲';
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = allProjects.filter(p =>
    (!filterStatus || p.status === filterStatus) &&
    (!filterWork   || p.work_type === filterWork) &&
    (!q || p.name.toLowerCase().includes(q) || (p.customer_name||'').toLowerCase().includes(q))
  );
  if (showUrgentOnly) filtered = filtered.filter(p => getUrgency(p) !== null);
  filtered.sort((a, b) => {
    const rank = u => !u ? 2 : u.level === 'critical' ? 0 : 1;
    return rank(getUrgency(a)) - rank(getUrgency(b));
  });
  filteredProjects = filtered;
  currentPage = 1;
  renderPage();
}

function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filteredProjects.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('projects-tbody');
  if (!filteredProjects.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">該当する案件がありません</td></tr>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  tbody.innerHTML = page.map(p => {
    const amount = p.status === '契約済' ? fmt(p.contract_amount) : fmt(p.estimated_amount);
    const urg = getUrgency(p);
    return `<tr${urg ? ` class="row-${urg.level}"` : ''}>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${urg ? `<span class="urgency-tag ${urg.level}">${urg.reason}</span> ` : ''}${p.name}</td>
      <td>${p.customer_name||'-'}</td>
      <td>${p.work_type||'-'}</td>
      <td>${p.staff||'-'}</td>
      <td><span class="badge badge-${STATUS_MAP[p.status]||'lost'}">${p.status}</span></td>
      <td class="center"><div class="prob-bar"><div class="bar-bg"><div class="bar-fill" style="width:${p.probability||0}%"></div></div><span class="bar-label">${p.probability||0}%</span></div></td>
      <td class="amount">${amount}</td>
      <td>${p.contract_date||'-'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-outline btn-sm" onclick="editProject(${p.id})">編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProject(${p.id}, '${p.name.replace(/'/g,"\\'")}')">削除</button>
      </td>
    </tr>`;
  }).join('');
  renderPagination();
}

function renderPagination() {
  const total = filteredProjects.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.style.display = 'none'; return; }
  pg.style.display = 'flex';
  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end   = Math.min(currentPage * PAGE_SIZE, total);
  const nums = Array.from({length: pages}, (_, i) => i + 1)
    .map(n => `<button class="page-btn${n === currentPage ? ' active' : ''}" onclick="goPage(${n})">${n}</button>`)
    .join('');
  pg.innerHTML = `<span class="page-info">${start}–${end} / ${total}件</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
      ${nums}
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>
    </div>`;
}

function goPage(n) {
  const pages = Math.ceil(filteredProjects.length / PAGE_SIZE);
  if (n < 1 || n > pages) return;
  currentPage = n;
  renderPage();
}

function exportCSV() {
  const headers = ['案件名','顧客名','工事種別','担当者','ステータス','確度(%)','金額','契約日'];
  const rows = filteredProjects.map(p => [
    p.name, p.customer_name||'', p.work_type||'', p.staff||'', p.status,
    p.probability||0,
    p.status==='契約済' ? p.contract_amount||0 : p.estimated_amount||0,
    p.contract_date||''
  ]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = `案件管理_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
}

function openModal(project) {
  const modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = project ? '案件編集' : '新規案件登録';
  if (project) {
    document.getElementById('edit-id').value = project.id;
    document.getElementById('f-name').value = project.name||'';
    document.getElementById('f-customer').value = project.customer_name||'';
    document.getElementById('f-staff').value = project.staff||'';
    document.getElementById('f-work-type').value = project.work_type||'';
    document.getElementById('f-status').value = project.status||'初回訪問済';
    document.getElementById('f-probability').value = project.probability||0;
    document.getElementById('f-estimated').value = project.estimated_amount||0;
    document.getElementById('f-address').value = project.address||'';
    document.getElementById('f-first-visit').value = project.first_visit_date||'';
    document.getElementById('f-planned-start').value = project.planned_start_date||'';
    document.getElementById('f-contract-date').value = project.contract_date||'';
    document.getElementById('f-contract-amount').value = project.contract_amount||0;
    document.getElementById('f-notes').value = project.notes||'';
  } else {
    document.getElementById('edit-id').value = '';
    ['f-name','f-customer','f-address','f-notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-staff').value = '';
    document.getElementById('f-work-type').value = '';
    document.getElementById('f-status').value = '初回訪問済';
    document.getElementById('f-probability').value = 0;
    document.getElementById('f-estimated').value = 0;
    document.getElementById('f-first-visit').value = '';
    document.getElementById('f-planned-start').value = '';
    document.getElementById('f-contract-date').value = '';
    document.getElementById('f-contract-amount').value = 0;
  }
  modal.classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function editProject(id) {
  const p = allProjects.find(x => x.id === id);
  if (p) openModal(p);
}

async function saveProject() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('案件名を入力してください'); return; }
  const id = document.getElementById('edit-id').value;
  const body = {
    name,
    customer_name: document.getElementById('f-customer').value,
    address: document.getElementById('f-address').value,
    work_type: document.getElementById('f-work-type').value,
    staff: document.getElementById('f-staff').value,
    status: document.getElementById('f-status').value,
    probability: document.getElementById('f-probability').value,
    estimated_amount: document.getElementById('f-estimated').value,
    first_visit_date: document.getElementById('f-first-visit').value,
    planned_start_date: document.getElementById('f-planned-start').value,
    contract_date: document.getElementById('f-contract-date').value,
    contract_amount: document.getElementById('f-contract-amount').value,
    notes: document.getElementById('f-notes').value,
  };
  const url = id ? `/api/projects/${id}` : '/api/projects';
  const method = id ? 'PUT' : 'POST';
  await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  closeModal();
  showToast(id ? '案件を更新しました' : '案件を登録しました');
  loadProjects();
}

async function deleteProject(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  await fetch(`/api/projects/${id}`, { method: 'DELETE' });
  showToast('案件を削除しました');
  loadProjects();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

loadProjects();
</script>
<script src="app.js"></script>
</body>
</html>
